aid: jelly-belly
name: Jelly Belly
description: >-
  Jelly Belly is the iconic American gourmet jelly bean candy company, owned
  by Ferrara Candy Company, known for its signature flavor assortments,
  themed collections, and historical association with American culture.
  This repository indexes the company's web properties and the community
  Jelly Belly Wiki API which catalogs Jelly Belly beans, flavors, recipes,
  facts, and milestones.
