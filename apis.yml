    name: Jelly Belly Wiki API
    description: >-
      The Jelly Belly Wiki API is a community-built, read-only REST API that
      provides detailed information about Jelly Belly beans, including flavor
      details, facts, milestones, and recipes. It is designed as a reference
      resource for Jelly Belly enthusiasts, hobbyist developers, and learners
      experimenting with public APIs.
